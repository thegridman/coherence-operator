# ---------------------------------------------------------------------------
# Coherence Operator GitHub Actions Release build.
# ---------------------------------------------------------------------------
name: Operator Early Access Release

on:
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REGISTRY_USERNAME: ${{ secrets.IMAGE_REGISTRY_USER }}
  REGISTRY_PASSWORD: ${{ secrets.IMAGE_REGISTRY_TOKEN }}
  OPERATOR_RELEASE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  OPERATOR_IMAGE_TAG: early-access

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: oracle-actions/setup-java@v1
        with:
          website: oracle.com
          release: 21

      - name: Cache Go Modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mods-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mods-

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Edit DNS Resolve
        shell: bash
        run: |
          sudo chown -R runner:runner /run/systemd/resolve/stub-resolv.conf
          sudo echo nameserver 8.8.8.8 > /run/systemd/resolve/stub-resolv.conf

      - name: Start KinD Cluster
        shell: bash
        run: |
          make kind
          kubectl version
          kubectl get nodes
          docker pull gcr.io/distroless/java
          docker pull gcr.io/distroless/java11-debian11
          docker pull gcr.io/distroless/java17-debian11
          docker pull gcr.io/distroless/java17-debian12
          docker pull gcr.io/distroless/java21-debian12
          make get-tanzu

      - name: Build EA Image
        shell: bash
        run: |
          docker login ghcr.io/oracle/ --username ${{ secrets.IMAGE_REGISTRY_USER }} --password ${{ secrets.IMAGE_REGISTRY_TOKEN }}
          git config --local user.name "Github Action"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          export NO_DAEMON=false
          make clean
          make build-operator
          make push-operator-image

      - name: Upload Release Manifests
        id: upload-manifests
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: build/_output/coherence-operator-manifests.tar.gz
          name: coherence-operator-manifests.tar.gz
          if-no-files-found: ignore

      - name: Upload Release Yaml
        id: upload-yaml
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: /tmp/coherence-operator/_output/coherence-operator.yaml
          name: coherence-operator.yaml
          if-no-files-found: ignore

      - name: Upload Restricted Release Yaml
        id: upload-restricted-release-yaml
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: /tmp/coherence-operator/_output/coherence-operator-restricted.yaml
          name: coherence-operator-restricted.yaml
          if-no-files-found: ignore

      - name: Upload Release CRD
        id: upload-release-crd
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: /tmp/coherence-operator/_output/manifests/crd/coherence.oracle.com_coherence.yaml
          name: coherence.oracle.com_coherence.yaml
          if-no-files-found: ignore

      - name: Upload Release Small CRD
        id: upload-release-small-crd
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: /tmp/coherence-operator/_output/manifests/crd-small/coherence.oracle.com_coherence.yaml
          name: coherence.oracle.com_coherence_small.yaml
          if-no-files-found: ignore

      - name: Upload Release Job CRD
        id: upload-release-job-crd
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: /tmp/coherence-operator/_output/manifests/crd/coherencejob.oracle.com_coherence.yaml
          name: coherencejob.oracle.com_coherence.yaml
          if-no-files-found: ignore

      - name: Upload Release Small Job CRD
        id: upload-release-job-small-crd
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: /tmp/coherence-operator/_output/manifests/crd-small/coherencejob.oracle.com_coherence.yaml
          name: coherencejob.oracle.com_coherence_small.yaml
          if-no-files-found: ignore

      - name: Upload Release Dashboards
        id: upload-release-dashboards
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: /tmp/coherence-operator/_output/coherence-dashboards.tar.gz
          name: coherence-dashboards.tar.gz
          if-no-files-found: ignore

      - name: Upload Bundle
        id: upload-bundle
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: /tmp/coherence-operator/_output/coherence-operator-bundle.tar.gz
          name: coherence-operator-bundle.tar.gz
          if-no-files-found: ignore

      - name: Upload Docs
        id: upload-docs
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: /tmp/coherence-operator/_output/docs.zip
          name: docs.zip
          if-no-files-found: ignore
